<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGMC — MINI Sales Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --red:#E2001A;--red-dark:#a80013;--red-glow:rgba(226,0,26,.15);
  --black:#0a0a0a;--dark:#111;--surface:#181818;--surface2:#202020;--surface3:#282828;
  --border:#2a2a2a;--border2:#333;--white:#f5f5f5;--silver:#c8c8c8;--dim:#888;--faint:#444;
  --green:#22c55e;--green-dim:#14532d;--amber:#f59e0b;--amber-dim:#78350f;
  --blue:#3b82f6;--blue-dim:#1e3a5f;--purple:#a855f7;--pink:#ec4899;
  --r:8px;--rl:14px;--rxl:20px;
  --sh:0 2px 16px rgba(0,0,0,.5);--shl:0 8px 48px rgba(0,0,0,.7);--shr:0 4px 24px rgba(226,0,26,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;height:-webkit-fill-available;}body{height:100%;height:-webkit-fill-available;font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);overflow:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:var(--dark);}::-webkit-scrollbar-thumb{background:var(--faint);border-radius:3px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(226,0,26,.12) 0%,transparent 70%),var(--black);position:relative;overflow:hidden;}
#login-screen::before{content:'MINI';position:absolute;font-size:380px;font-weight:800;color:rgba(255,255,255,.015);letter-spacing:-20px;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);}
.login-wrap{width:420px;position:relative;z-index:1;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.login-header{text-align:center;margin-bottom:32px;}
.login-ring{display:none;}
.login-ring svg{width:42px;height:42px;}
.login-brand{font-size:12px;font-weight:700;letter-spacing:6px;color:var(--silver);text-transform:uppercase;margin-bottom:4px;}
.login-title{font-size:26px;font-weight:800;color:var(--white);}
.login-title span{color:var(--red);}
.login-sub{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:1px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);padding:32px;box-shadow:var(--shl);}
.ll{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;display:block;}
.ls,.li{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--white);font-family:'Outfit',sans-serif;font-size:16px;outline:none;appearance:none;transition:border-color .2s;margin-bottom:16px;}
.ls:focus,.li:focus{border-color:var(--red);}
.ls option{background:var(--surface2);}
.ldiv{border:none;border-top:1px solid var(--border);margin:0 0 16px;}
.lbtn{width:100%;padding:13px;background:var(--red);border:none;border-radius:var(--r);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.lbtn:hover{background:var(--red-dark);box-shadow:var(--shr);transform:translateY(-1px);}
.lbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* APP */
#app{display:none;height:100vh;height:-webkit-fill-available;flex-direction:row;overflow:hidden;width:100%;}
#app.on{display:flex;}

/* SIDEBAR */
.sb{width:240px;min-width:240px;background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.sb-brand{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-ring{display:none;}
.sb-ring svg{width:19px;height:19px;}
.sb-bname{font-size:14px;font-weight:800;color:var(--white);letter-spacing:1px;}
.sb-bsub{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}
.sb-user{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.sb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff;}
.sb-uname{font-size:12px;font-weight:600;color:var(--white);line-height:1.2;}
.sb-urole{font-size:10px;color:var(--dim);}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;border-left:2px solid transparent;transition:all .15s;position:relative;}
.nav-item:hover{color:var(--silver);background:var(--surface);}
.nav-item.active{color:var(--white);background:rgba(226,0,26,.08);border-left-color:var(--red);}
.nav-item .ni{font-size:14px;width:17px;text-align:center;}
.nb{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sb-foot{padding:13px 18px;border-top:1px solid var(--border);}
.logoutbtn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--dim);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;justify-content:center;}
.logoutbtn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0;max-width:100vw;}
.topbar{padding:0 26px;height:52px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pg-title{font-size:17px;font-weight:700;color:var(--white);}
.tb-right{display:flex;align-items:center;gap:9px;}
.tb-date{font-size:10px;color:var(--dim);font-family:'Space Mono',monospace;}
.tb-btn{width:33px;height:33px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;position:relative;transition:all .15s;}
.tb-btn:hover{border-color:var(--red);}
.nb-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--red);border:1.5px solid var(--dark);display:none;}
.nb-dot.on{display:block;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 26px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;min-height:0;scroll-behavior:smooth;}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--dim);font-size:13px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PAGE */
.page{display:none;animation:pgIn .25s ease;}
.page.active{display:block;}
@keyframes pgIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px;}
.sg.s3{grid-template-columns:repeat(3,1fr);}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:17px 18px;position:relative;overflow:hidden;transition:border-color .2s;}
.sc:hover{border-color:var(--border2);}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.red::before{background:var(--red);}
.sc.green::before{background:var(--green);}
.sc.amber::before{background:var(--amber);}
.sc.blue::before{background:var(--blue);}
.sc.purple::before{background:var(--purple);}
.slbl{font-size:10px;font-weight:600;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.sval{font-size:32px;font-weight:800;line-height:1;}
.ssub{font-size:10px;color:var(--faint);margin-top:5px;}
.sico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:24px;opacity:.1;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:16px;overflow:hidden;}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:13px;font-weight:700;color:var(--white);}
.cb{padding:16px 18px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}

/* ── TABLE SCROLL: single authoritative ruleset ── */
/* Desktop/tablet: tables scroll horizontally inside their container */
.tbl{
  display:block;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  white-space:nowrap;
  font-size:12px;
  width:100%;
}
/* thead/tbody/tr must be display:table so columns line up */
.tbl thead,
.tbl tbody{
  display:table;
  width:100%;
  table-layout:auto;
}
.tbl tr{
  display:table-row;
}
.tbl th{padding:8px 13px;font-size:9px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:1.5px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.tbl td{padding:10px 13px;font-size:12px;color:var(--dim);border-bottom:1px solid var(--border);transition:background .1s;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}
.tb{color:var(--white)!important;font-weight:600;}
.tm{font-family:'Space Mono',monospace;font-size:10px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:1px solid;white-space:nowrap;}
.br{background:rgba(226,0,26,.1);color:#ff4444;border-color:rgba(226,0,26,.3);}
.bg{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3);}
.ba{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.3);}
.bb{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.3);}
.bp{background:rgba(168,85,247,.1);color:var(--purple);border-color:rgba(168,85,247,.3);}
.bgr{background:rgba(136,136,136,.1);color:var(--dim);border-color:var(--border2);}
.bw{background:rgba(245,245,245,.08);color:var(--silver);border-color:var(--border2);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid;white-space:nowrap;}
.btn-red{background:var(--red);color:#fff;border-color:transparent;}
.btn-red:hover{background:var(--red-dark);}
.btn-ghost{background:transparent;color:var(--dim);border-color:var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--silver);background:var(--surface2);}
.btn-green{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3);}
.btn-green:hover{background:rgba(34,197,94,.2);}
.btn-amber{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.3);}
.btn-blue{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.3);}
.btn-blue:hover{background:rgba(59,130,246,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* FORM */
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.fc{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--white);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color .2s;appearance:none;}
.fc:focus{border-color:var(--red);}
textarea.fc{resize:vertical;min-height:70px;}
.fc option{background:var(--surface2);}
.fr{display:grid;gap:11px;margin-bottom:13px;}
.fr.c2{grid-template-columns:1fr 1fr;}
.fr.c3{grid-template-columns:1fr 1fr 1fr;}

/* PDI TRACK */
.pdi-track{display:flex;align-items:flex-start;padding:6px 0;}
.pdi-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative;}
.pdi-step:not(:last-child)::after{content:'';position:absolute;top:11px;left:calc(50% + 13px);width:calc(100% - 26px);height:2px;background:var(--border2);z-index:0;}
.pdi-step.done:not(:last-child)::after{background:var(--green);}
.pdidot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;transition:all .2s;flex-shrink:0;}
.pdi-step.done .pdidot{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green);}
.pdi-step.curr .pdidot{border-color:var(--red);background:var(--red-glow);color:var(--red);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,0,26,.3);}50%{box-shadow:0 0 0 6px rgba(226,0,26,0);}}
.pdilbl{font-size:8px;color:var(--faint);text-align:center;max-width:56px;line-height:1.3;}
.pdi-step.done .pdilbl{color:var(--green);}
.pdi-step.curr .pdilbl{color:var(--red);}

/* FILTER BAR */
.fbar{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.sw{position:relative;flex:1;min-width:170px;}
.swi{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px;}
.si{width:100%;padding:8px 11px 8px 32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--white);font-family:'Outfit',sans-serif;font-size:12px;outline:none;}
.si:focus{border-color:var(--red);}
.fs{padding:8px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--dim);font-family:'Outfit',sans-serif;font-size:12px;outline:none;cursor:pointer;appearance:none;min-width:120px;}
.fs:focus{border-color:var(--red);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sttl{font-size:19px;font-weight:800;color:var(--white);}

/* PROGRESS */
.pb{background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.pf{height:100%;border-radius:4px;transition:width .4s ease;}
.pf-red{background:linear-gradient(90deg,var(--red-dark),var(--red));}
.pf-green{background:linear-gradient(90deg,var(--green-dim),var(--green));}
.pf-amber{background:linear-gradient(90deg,var(--amber-dim),var(--amber));}

/* FLAGS */
.flg{background:rgba(226,0,26,.04);border:1px solid rgba(226,0,26,.2);border-radius:var(--rl);padding:14px;margin-bottom:11px;display:flex;gap:11px;}
.flg.res{background:rgba(34,197,94,.04);border-color:rgba(34,197,94,.2);}
.flg-ttl{font-size:13px;font-weight:700;color:#ff4444;margin-bottom:2px;}
.flg.res .flg-ttl{color:var(--green);}
.flg-body{font-size:12px;color:var(--dim);margin-bottom:3px;}
.flg-meta{font-size:10px;color:var(--faint);}

/* ROSTER */
.roster{border-collapse:collapse;width:100%;min-width:680px;}
.roster th{padding:9px 11px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;}
.roster th:first-child{text-align:left;}
.roster td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;transition:background .1s;}
.roster td:last-child,.roster th:last-child{border-right:none;}
.roster tr:last-child td{border-bottom:none;}
.roster tr:hover td{background:var(--surface2);}
.ron{background:rgba(34,197,94,.08);color:var(--green);font-weight:700;font-size:11px;}
.roff{color:var(--faint);font-size:11px;}
.ram{background:rgba(59,130,246,.08);color:var(--blue);font-weight:700;font-size:11px;}
.rpm{background:rgba(245,158,11,.08);color:var(--amber);font-weight:700;font-size:11px;}

/* CALENDAR */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dh{text-align:center;font-size:9px;font-weight:700;color:var(--faint);letter-spacing:1.5px;padding:5px 0;text-transform:uppercase;}
.cal-day{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);min-height:68px;padding:6px;cursor:pointer;transition:all .15s;}
.cal-day:hover{border-color:var(--red);}
.cal-day.today{border-color:var(--red);background:rgba(226,0,26,.04);}
.cal-dn{font-size:11px;font-weight:700;margin-bottom:3px;color:var(--silver);}
.cal-day.today .cal-dn{color:var(--red);}
.cal-ev{font-size:8px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-d{background:rgba(34,197,94,.15);color:var(--green);}
.ev-p{background:rgba(226,0,26,.15);color:var(--red);}

/* UPLOAD */
.upzone{border:2px dashed var(--border2);border-radius:var(--rl);padding:28px;text-align:center;cursor:pointer;transition:all .2s;}
.upzone:hover{border-color:var(--red);background:rgba(226,0,26,.03);}
.upi{font-size:26px;margin-bottom:7px;}
.upt{font-size:14px;font-weight:600;color:var(--silver);margin-bottom:2px;}
.ups{font-size:11px;color:var(--faint);}

/* NOTIF */
.np{position:fixed;top:52px;right:0;width:320px;background:var(--dark);border-left:1px solid var(--border);border-bottom:1px solid var(--border);box-shadow:var(--shl);z-index:997;max-height:calc(100vh - 52px);overflow-y:auto;display:none;}
.np.on{display:block;animation:slideL .2s ease;}
@keyframes slideL{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:translateX(0);}}
.np-hd{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.np-ttl{font-size:13px;font-weight:700;}
.ni{padding:12px 17px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.ni:hover{background:var(--surface);}
.ni.unread{border-left:2px solid var(--red);}
.ni-t{font-size:12px;font-weight:600;color:var(--white);margin-bottom:2px;}
.ni-b{font-size:11px;color:var(--dim);margin-bottom:2px;}
.ni-ts{font-size:10px;color:var(--faint);font-family:'Space Mono',monospace;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;}
.mov.on{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;scale:.96;}to{opacity:1;scale:1;}}
.mh{padding:17px 21px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mt{font-size:17px;font-weight:800;}
.mx{font-size:17px;cursor:pointer;color:var(--faint);background:none;border:none;transition:color .15s;}
.mx:hover{color:var(--white);}
.mb{padding:21px;}
.mf{padding:13px 21px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;}

/* TOAST */
.tw{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--white);box-shadow:var(--sh);display:flex;align-items:center;gap:9px;min-width:240px;max-width:320px;animation:tIn .22s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.toast.tok{border-color:rgba(34,197,94,.3);}
.toast.twarn{border-color:rgba(245,158,11,.3);}
.toast.terr{border-color:rgba(226,0,26,.3);}

/* UPLOAD PREVIEW */
.up-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-top:14px;}
.up-prev-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface);}
.up-prev-title{font-size:12px;font-weight:700;color:var(--white);}
.up-prev-sub{font-size:10px;color:var(--dim);}
.up-scroll{overflow-x:auto;overflow-y:auto;max-height:300px;width:100%;-webkit-overflow-scrolling:touch;}
.up-tbl{border-collapse:collapse;font-size:11px;white-space:nowrap;}
.up-tbl th{padding:7px 10px;background:var(--surface);color:var(--faint);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;}
.up-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--dim);white-space:nowrap;}
.up-tbl tr:last-child td{border-bottom:none;}
.up-tbl tr:hover td{background:var(--surface);}
.up-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:center;justify-content:space-between;}
.up-count{font-size:11px;color:var(--dim);}
.up-err{background:rgba(226,0,26,.06);border:1px solid rgba(226,0,26,.2);border-radius:var(--r);padding:9px 13px;font-size:11px;color:#ff4444;margin-top:10px;}
.up-ok{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:var(--r);padding:9px 13px;font-size:11px;color:var(--green);margin-top:10px;}
.upzone-active{border-color:var(--red)!important;background:rgba(226,0,26,.05)!important;}
/* PIN CHANGE */
.pin-status-ok{font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px;margin-top:6px;}
.pin-status-warn{font-size:10px;color:var(--amber);display:flex;align-items:center;gap:5px;margin-top:6px;}
.pin-status-exp{font-size:10px;color:var(--red);display:flex;align-items:center;gap:5px;margin-top:6px;}
.pin-strength{height:4px;border-radius:4px;margin-top:6px;transition:all .3s;}
/* MISC */
hr.dv{border:none;border-top:1px solid var(--border);margin:14px 0;}
.empty{text-align:center;padding:40px 16px;color:var(--faint);}
.empty-ico{font-size:30px;margin-bottom:9px;}
.eq-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s;}
.eq-card:hover{border-color:var(--red);}
.eq-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.eq-name{font-size:14px;font-weight:700;color:var(--white);}
.eq-model{font-size:12px;color:var(--dim);}
.eq-meta{display:flex;gap:12px;font-size:10px;color:var(--faint);flex-wrap:wrap;}
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:13px;}
.cond-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px;}
.cond-item label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block;}
.wbox{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--amber);margin-bottom:13px;display:flex;gap:7px;align-items:flex-start;}
.ibox{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.25);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--blue);margin-bottom:13px;}
.pipe-stages{display:flex;overflow-x:auto;padding-bottom:3px;}
.pipe-st{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:75px;padding:9px 3px;border-right:1px solid var(--border);}
.pipe-st:last-child{border-right:none;}
.pipe-num{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;}
.pipe-name{font-size:9px;color:var(--dim);text-align:center;}

/* ══════════════════════════════════════
   RESPONSIVE — TABLET & MOBILE
══════════════════════════════════════ */

/* ── Hamburger — hidden on desktop ── */
#menu-btn{
  display:none;
  width:38px;height:38px;border-radius:var(--r);
  background:var(--surface2);border:1px solid var(--border);
  align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;flex-shrink:0;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
#menu-btn:active{background:var(--surface3);}

/* ── Overlay ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:998;
  -webkit-tap-highlight-color:transparent;
}
.overlay.on{display:block;}

/* ══ TABLET ≤900px ══ */
@media(max-width:900px){
  /* Show hamburger */
  #menu-btn{display:flex;}

  /* Sidebar slides in from left */
  .sb{
    position:fixed;
    left:0;top:0;bottom:0;
    height:100%;
    height:-webkit-fill-available;
    z-index:999;width:260px;min-width:260px;
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    will-change:transform;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }
  .sb.open{transform:translateX(0) !important;}

  /* Main takes full width */
  .main{width:100%;min-width:0;}

  /* Layouts */
  .sg{grid-template-columns:1fr 1fr;gap:10px;}
  .sg.s3{grid-template-columns:1fr 1fr;}
  .g2,.g3{grid-template-columns:1fr;}
  .fr.c2{grid-template-columns:1fr 1fr;}
  .fr.c3{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 14px;}
  .content{padding:16px 14px;}

  /* Tables */
  .tbl th,.tbl td{padding:8px 10px;font-size:11px;}

  /* Modal — centered on tablet */
  .mov{align-items:center;padding:16px;}
  .modal{width:92vw;max-width:580px;max-height:92vh;border-radius:var(--rxl);}

  /* Notif panel */
  .np{width:300px;}

  /* PDI track */
  .pdi-track{overflow-x:auto;padding-bottom:6px;}
  .pdi-step{min-width:62px;}

  /* Calendar */
  .cal-day{min-height:54px;}
  .cal-ev{font-size:7px;}

  /* Roster */
  .roster-wrap,.roster{overflow-x:auto;}
}

/* ══ MOBILE ≤600px ══ */
@media(max-width:600px){
  /* Sidebar full-height slide */
  .sb{width:78vw;min-width:240px;}

  /* Stats 2-col */
  .sg{grid-template-columns:1fr 1fr;gap:8px;}
  .sg.s3{grid-template-columns:1fr 1fr;}
  .sval{font-size:24px;}
  .sc{padding:12px 13px;}
  .ssub{font-size:9px;}
  .sico{font-size:20px;}

  /* All grids single col */
  .g2,.g3{grid-template-columns:1fr;}
  .fr.c2,.fr.c3{grid-template-columns:1fr;}

  /* Typography */
  .sttl,.section-ttl{font-size:17px;}
  .pg-title{font-size:15px;}
  .ct,.card-title{font-size:12px;}

  /* Spacing */
  .topbar{height:50px;padding:0 12px;}
  .content{padding:12px 10px;}
  .cb,.card-body{padding:12px 13px;}
  .ch,.card-head{padding:11px 13px;flex-wrap:wrap;gap:6px;}

  .tbl thead,.tbl tbody,.tbl tr{display:table;width:100%;table-layout:fixed;}
  .tbl thead{width:calc(100% - 0px);}

  /* Buttons */
  .btn{font-size:11px;padding:7px 11px;min-height:38px;}
  .btn-sm{font-size:10px;padding:5px 9px;min-height:34px;}
  .btn-xs{font-size:9px;padding:4px 7px;min-height:30px;}

  /* Filter bar */
  .fbar{flex-direction:column;gap:8px;}
  .sw,.fs{width:100%;min-width:unset;}

  /* Section header */
  .shd{flex-direction:column;align-items:flex-start;gap:8px;}
  .shd > div{flex-wrap:wrap;}

  /* Modal — bottom sheet on mobile */
  .mov{align-items:flex-end;padding:0;}
  .modal{
    width:100vw;max-width:100vw;
    border-radius:20px 20px 0 0;
    position:fixed;bottom:0;
    max-height:90vh;
    animation:sheetUp .25s ease;
  }
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}

  /* Notif panel full width */
  .np{width:100%;max-width:100%;right:0;left:0;}

  /* Login */
  .login-wrap{width:96vw;max-width:420px;}
  .login-card{padding:22px 18px;}

  /* PDI */
  .pdi-step{min-width:55px;}
  .pdidot{width:22px;height:22px;font-size:9px;}
  .pdi-lbl{font-size:7px;max-width:48px;}

  /* Pipeline */
  .pipe-st{min-width:68px;}
  .pipe-num{font-size:17px;}
  .pipe-name{font-size:8px;}

  /* Calendar hide events */
  .cal-day{min-height:42px;padding:3px;}
  .cal-ev{display:none;}
  .cal-dh{font-size:8px;letter-spacing:0;}

  /* Flags */
  .flg{flex-direction:column;gap:8px;}
  .eq-meta{gap:6px;font-size:10px;}

  /* Roster */
  .roster td,.roster th{padding:6px 7px;font-size:10px;}

  /* Prevent iOS double-tap zoom */
  * {touch-action:manipulation;}

  /* Prevent iOS input zoom */
  input,select,textarea{font-size:16px !important;}
}

/* ══════════════════════════════════════
   MOBILE — SAFARI iPhone COMPLETE FIX
══════════════════════════════════════ */
@media(max-width:600px){

  /* Prevent iOS Safari bounce */
  body{position:fixed;width:100%;overflow:hidden;}

  /* Nuclear fix: NO horizontal overflow anywhere */
  *, *::before, *::after {
    box-sizing: border-box !important;
    max-width: 100% !important;
    word-break: break-word;
  }

  /* Page container */
  .content { padding: 10px 8px !important; }

  .tbl, table {
    display: block !important;

  /* ── LAYOUTS ── */
  .g2, .g3                { grid-template-columns: 1fr !important; }

  /* ── SECTION HEADER ── */
  .shd { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }

  .fbar { flex-direction: column !important; gap: 8px !important; }

  .topbar { height: 50px !important; padding: 0 10px !important; }

  /* ── BUTTONS ── */
  .btn { font-size: 11px !important; padding: 7px 10px !important; white-space: nowrap; }
  .btn-sm { font-size: 10px !important; padding: 6px 9px !important; }
  .btn-xs { font-size: 10px !important; padding: 5px 8px !important; }
  td > div, td .btn-wrap { display: flex !important; flex-wrap: wrap !important; gap: 4px !important; }

  /* ── MODAL — bottom sheet ── */
  .mov { align-items: flex-end !important; padding: 0 !important; }
  .modal {
    width: 100vw !important; max-width: 100vw !important;
    border-radius: 18px 18px 0 0 !important;
    position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
    max-height: 88vh !important;
    overflow-y: auto !important; -webkit-overflow-scrolling: touch !important;
  }
  .mb { padding: 16px 14px !important; }
  .mf { padding: 12px 14px !important; flex-wrap: wrap !important; }
  .mt { font-size: 16px !important; }

  /* ── NOTIFICATION PANEL ── */
  .np { width: 100% !important; left: 0 !important; right: 0 !important; }

  /* ── PDI TRACKER ── */
  .pdi-track { overflow-x: auto !important; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
  .pdi-step  { min-width: 56px !important; flex-shrink: 0 !important; }

  /* ── PIPELINE ── */
  .pipe-stages { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  .pipe-st     { min-width: 68px !important; flex-shrink: 0 !important; }

  /* ── CALENDAR ── */
  .cal-ev  { display: none !important; }
  .cal-day { min-height: 38px !important; padding: 2px 3px !important; }
  .cal-dn  { font-size: 10px !important; }
  .cal-dh  { font-size: 8px !important; letter-spacing: 0 !important; }

  /* ── ROSTER ── */
  .roster-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch; display: block !important; }
  .roster { white-space: nowrap !important; }
  .roster td, .roster th { padding: 7px 8px !important; font-size: 10px !important; }

  /* ── ENQUIRY CARDS ── */
  .eq-meta { flex-wrap: wrap !important; gap: 6px !important; font-size: 10px !important; }
  .eq-name { font-size: 13px !important; }

  /* ── FLAGS ── */

  .flg > div:last-child { flex-direction: row !important; flex-wrap: wrap !important; }

  /* ── FORM CONTROLS ── */

    font-size: 16px !important; /* CRITICAL: prevents Safari zoom */
    width: 100% !important;
    max-width: 100% !important;
  }

  /* ── LOGIN ── */
  .login-wrap { width: 96vw !important; }
  .login-card { padding: 22px 16px !important; }

  /* ── BADGES ── */
  .badge { font-size: 9px !important; padding: 3px 7px !important; white-space: nowrap; }

  /* ── DEMO CARS INLINE GRID ── */
  .cond-grid { grid-template-columns: 1fr 1fr !important; }

  /* ── PROGRESS BAR LABELS ── */
  .pb { height: 6px !important; }
}

/* ── TABLET 601-900px ── */
@media(min-width:601px) and (max-width:900px){

  .g3 { grid-template-columns: 1fr 1fr; }

<!-- LOGIN -->
<div id="login-screen">

// ── PIN MANAGEMENT ────────────────────────────────────────
const PIN_EXPIRY_DAYS = 90;

function getPINData(name){
  try {
    const raw = localStorage.getItem('agmc_pin_'+name.replace(/\s+/g,'_'));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function setPINData(name, pin){
  const data = { pin, changed: new Date().toISOString() };
  localStorage.setItem('agmc_pin_'+name.replace(/\s+/g,'_'), JSON.stringify(data));
}

function getPINForUser(name, defaultPin){
  const stored = getPINData(name);
  return stored ? stored.pin : defaultPin;
}

function getPINDaysLeft(name){
  const stored = getPINData(name);
  if(!stored) return PIN_EXPIRY_DAYS; // never changed — uses default, show full
  const changed = new Date(stored.changed);
  const now = new Date();
  const daysSince = Math.floor((now - changed) / (1000*60*60*24));
  return Math.max(0, PIN_EXPIRY_DAYS - daysSince);
}

function getPINExpired(name){
  const stored = getPINData(name);
  if(!stored) return false; // default PIN never expires until changed
  return getPINDaysLeft(name) === 0;
}

async function doLogin(){
  const r=document.getElementById('role-sel').value;
  const u=document.getElementById('user-sel').value;
  const pin=document.getElementById('pin-in').value.trim();
  if(!r||!u){toast('Please select your role and name.','warn');return;}
  if(!pin){toast('Please enter your PIN.','warn');return;}
  // Check PIN — use stored PIN if user has changed it, else use default
  const userDefault = USER_DB.find(x=>x.name===u&&x.role===r);
  if(!userDefault){toast('User not found.','err');return;}
  const effectivePin = getPINForUser(u, userDefault.pin);
  if(pin !== effectivePin){
    toast('Incorrect PIN. Please try again.','err');
    document.getElementById('pin-in').style.animation='shake 0.4s ease';
    setTimeout(()=>document.getElementById('pin-in').style.animation='',500);
    document.getElementById('pin-in').value='';
    document.getElementById('pin-in').focus();
    return;
  }
  // Check PIN expiry
  if(getPINExpired(u)){
    toast('Your PIN has expired. Please set a new one.','warn');
    document.getElementById('pin-in').value='';
    // Force PIN change on login
    setTimeout(()=>showForcedPINChange(u,r),300);
    return;
  }
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Loading…';
  curRole=r; curUser=u;
  sessionStorage.setItem('agmc_role', r);
  sessionStorage.setItem('agmc_user', u);
  await loadAll();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('on');
  btn.disabled=false; btn.textContent='Enter →';
  initApp();
  // Warn if PIN expiring soon (≤14 days)
  const daysLeft = getPINDaysLeft(u);
  if(daysLeft <= 14 && daysLeft > 0){
    setTimeout(()=>toast(`⚠️ PIN expires in ${daysLeft} day${daysLeft===1?'':'s'} — please change it soon.`,'warn'), 1500);
  }
}

function showForcedPINChange(userName, userRole){
  openM('🔑 PIN Expired — Set New PIN',`
    <div style="background:rgba(226,0,26,.06);border:1px solid rgba(226,0,26,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--red)">
      ⚠️ Your PIN has expired after ${PIN_EXPIRY_DAYS} days. You must set a new PIN to continue.
    </div>
    <div class="fg"><label>New PIN (4 digits)</label>
      <input type="password" class="fc" id="fpc-new" maxlength="4" placeholder="Enter new 4-digit PIN" oninput="checkPINStrength('fpc-new','fpc-strength','fpc-match','fpc-confirm')"/>
      <div id="fpc-strength" class="pin-strength" style="background:var(--border2);width:0%"></div>
    </div>
    <div class="fg"><label>Confirm New PIN</label>
      <input type="password" class="fc" id="fpc-confirm" maxlength="4" placeholder="Repeat new PIN" oninput="checkPINStrength('fpc-new','fpc-strength','fpc-match','fpc-confirm')"/>
      <div id="fpc-match" style="font-size:10px;color:var(--faint);margin-top:4px"></div>
    </div>
  `,`<button class="btn btn-red" onclick="doForcedPINSave('${userName}','${userRole}')">Set New PIN & Continue →</button>`);
}

async function doForcedPINSave(userName, userRole){
  const np = document.getElementById('fpc-new')?.value.trim();
  const cp = document.getElementById('fpc-confirm')?.value.trim();
  if(!np||np.length!==4||!/^\d{4}$/.test(np)){toast('PIN must be exactly 4 digits','warn');return;}
  if(np!==cp){toast('PINs do not match','warn');return;}
  setPINData(userName, np);
  closeM();
  toast('New PIN set ✓ Logging you in…','ok');
  // Auto login after forced change
  setTimeout(async()=>{
    curRole=userRole; curUser=userName;
    sessionStorage.setItem('agmc_role',userRole);
    sessionStorage.setItem('agmc_user',userName);
    await loadAll();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('on');
    initApp();
  }, 800);
}

function doLogout(){
  sessionStorage.removeItem('agmc_role');
  sessionStorage.removeItem('agmc_user');
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('role-sel').value='';
  document.getElementById('user-sel').innerHTML='<option>— Select role first —</option>';
  document.getElementById('pin-in').value='';
  curUser=null;curRole=null;
}

async function goTo(page){

  const c=document.getElementById('content');
  c.innerHTML=`<div class="loader"><div class="spin"></div>Loading…</div>`;
  await loadAll();

  const pg=document.createElement('div');
  pg.className='page active';
  if(PAGES[page]){
    try {
      pg.innerHTML = PAGES[page]();

function filterPDI(){
  const s   = (document.getElementById('pdi-search')?.value||'').toLowerCase();
  const stg = document.getElementById('pdi-stage-filter')?.value;

  const tnt = document.getElementById('pdi-tint-filter')?.value||'';
  const bks = myBks().filter(b=>{
    const ms  = !s || (b.customer||'').toLowerCase().includes(s)
                   || (b.model||'').toLowerCase().includes(s)
                   || (b.vin||'').toLowerCase().includes(s)
                   || (b.se||'').toLowerCase().includes(s)
                   || (b.id||'').toLowerCase().includes(s);
    const mst = stg===''||stg===undefined || b.pdi===parseInt(stg);
    const mse = !se  || b.se===se;
    const mtn = !tnt || b.tinting===tnt;
    return ms && mst && mse && mtn;
  });
  const results = document.getElementById('pdi-results');
  if(results){
    results.innerHTML = bks.length
      ? bks.map(b=>renderPDICard(b)).join('')
      : `<div class="empty"><div class="empty-ico">🔍</div><p>No PDI records match your search</p></div>`;
  }
}

async function doAdvancePDI(id){
  const b=DB.bookings.find(x=>x.id===id); if(!b) return;
  if(b.pdi>=6){toast('Already at Ready for Delivery','warn');return;}
  const newPdi=b.pdi+1;
  const {error}=await supa.from('bookings').update({pdi:newPdi}).eq('id',id);
  if(error){toast('Error updating PDI','err');return;}
  await supa.from('pdi_logs').insert({booking_id:id,stage:newPdi,stage_name:PDI_STAGES[newPdi],updated_by:curUser,notes:''});
  await supa.from('notifications').insert({title:`PDI Update — ${id}`,body:`${b.model} moved to ${PDI_STAGES[newPdi]} by ${curUser}`,type:'pdi',target_role:'all',read:false,booking_id:id});
  toast(`PDI: ${PDI_STAGES[newPdi]}`,'ok');
  goTo(curPage);
}

async function doAdvanceDeal(id){
  const b=DB.bookings.find(x=>x.id===id); if(!b) return;
  const i=DEAL_STAGES.indexOf(b.deal);
  if(i>=DEAL_STAGES.length-1){toast('Already Delivered','warn');return;}
  const newDeal=DEAL_STAGES[i+1];
  const {error}=await supa.from('bookings').update({deal:newDeal}).eq('id',id);
  if(error){toast('Error updating deal','err');return;}
  await supa.from('notifications').insert({title:`Deal Update — ${id}`,body:`${b.model} moved to ${newDeal} by ${curUser}`,type:'deal',target_role:'all',read:false,booking_id:id});
  toast(`Deal: ${newDeal}`,'ok');
  goTo(curPage);
}

async function doMarkLost(id){

  if(!reason){ toast('Please select a reason','warn'); return; }
  const b = DB.bookings.find(x=>x.id===id);

  const {error} = await supa.from('bookings').update({
    deal: 'Lost',
    notes: lostNotes,
  }).eq('id', id);
  if(error){ toast('Error: '+error.message,'err'); return; }

  await supa.from('notifications').insert([{

    body:  `${curUser} marked ${b?.customer} (${b?.model}) as Lost. Reason: ${reason}`,

  }]);

async function doDeleteBooking(id, customerName){
  if(!confirm(`Permanently delete booking for "${customerName}"? This cannot be undone.`)) return;
  // Delete related records first
  await supa.from('pdi_logs').delete().eq('booking_id', id);
  await supa.from('flags').delete().eq('booking_id', id);
  await supa.from('deliveries').delete().eq('booking_id', id);
  const {error} = await supa.from('bookings').delete().eq('id', id);
  if(error){ toast('Error deleting: '+error.message,'err'); return; }
  toast(`Booking deleted permanently`,'ok');
  await loadAll(); goTo('bookings');
}

async function doSaveDailyUpdate(bookingId){
  const comment = document.getElementById('upd-comment')?.value.trim();
  const tag     = document.getElementById('upd-tag')?.value||null;
  const fileEl  = document.getElementById('upd-file');
  if(!comment){ toast('Please write a comment','warn'); return; }

  let file_url = null;
  // Upload file to Supabase Storage if provided
  if(fileEl?.files?.length > 0){
    const file = fileEl.files[0];
    const path = `updates/${bookingId}/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
    const {data: up, error: ue} = await supa.storage.from('attachments').upload(path, file, {upsert:true});
    if(ue){ toast('File upload failed: '+ue.message,'warn'); }
    else {
      const {data: url} = supa.storage.from('attachments').getPublicUrl(path);
      file_url = url?.publicUrl||null;
    }
  }

  const record = {
    booking_id:  bookingId,
    comment,
    tag,
    file_url,
    created_by:  curUser,
    created_at:  new Date().toISOString(),
    se:          DB.bookings.find(b=>b.id===bookingId)?.se||curUser,
  };

  const {error} = await supa.from('booking_updates').insert([record]);
  if(error){ toast('Error: '+error.message,'err'); return; }

  // Notify SA and SS
  const b = DB.bookings.find(x=>x.id===bookingId);
  await supa.from('notifications').insert([
    {title:`💬 Update — ${bookingId}`,body:`${curUser}: ${comment.substring(0,80)}`,type:'deal',target_role:'sa',read:false,booking_id:bookingId},
  ]);
  closeM(); toast('Update saved ✓','ok');
  await loadAll();
}

async function runDBDiagnostic(){
  const el = document.getElementById('db-diag');
  if(!el) return;
  el.innerHTML = '<div style="color:var(--amber);font-size:12px;padding:10px">🔍 Checking Supabase columns...</div>';
  try {
    const {data: sample, error: e1} = await supa.from('bookings').select('*').limit(1);
    if(e1) throw new Error(e1.message);
    const EXPECTED = ['id','customer','model','color','vin','se','date','deal','pdi','model_year','vsb_no','enq_number','trim','deposit','bank_name'];
    const actual = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
    const missing = EXPECTED.filter(c => !actual.includes(c));
    const present = EXPECTED.filter(c => actual.includes(c));
    const {data: s2} = await supa.from('bookings').select('id,model,model_year,vsb_no,trim,deposit,bank_name').limit(3);
    let rows = (s2||[]).map(b => {
      const myColor = b.model_year ? 'var(--green)' : 'var(--red)';
      return '<tr><td>'+b.id+'</td><td>'+b.model+'</td><td style="color:'+myColor+'">'+(b.model_year||'MISSING')+'</td><td>'+(b.vsb_no||'—')+'</td><td>'+(b.trim||'—')+'</td><td>'+(b.deposit||'0')+'</td><td>'+(b.bank_name||'—')+'</td></tr>';
    }).join('');
    let missingHtml = missing.length > 0
      ? '<div style="background:rgba(226,0,26,.08);border:1px solid rgba(226,0,26,.3);border-radius:6px;padding:10px 12px;margin-bottom:10px"><div style="color:var(--red);font-weight:700;margin-bottom:4px">MISSING COLUMNS ('+missing.length+'): '+missing.join(', ')+'</div><div style="color:var(--dim);font-size:11px">Run agmc_add_booking_columns.sql in Supabase SQL Editor</div></div>'
      : '<div style="color:var(--green);margin-bottom:10px">All columns present!</div>';
    el.innerHTML = '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-size:12px">'
      + '<div style="font-weight:700;color:var(--white);margin-bottom:10px">Supabase bookings — Column Check</div>'
      + '<div style="color:var(--green);margin-bottom:8px;font-size:11px">Present: '+present.join(', ')+'</div>'
      + missingHtml

function checkPINStrength(newId, strengthId, matchId, confirmId){
  const np = document.getElementById(newId)?.value||'';
  const cp = document.getElementById(confirmId)?.value||'';
  const sb = document.getElementById(strengthId);
  const mb = document.getElementById(matchId);
  if(sb){
    let strength=0, color='var(--red)', w='25%';
    if(np.length>=4) strength++;
    if(/^\d{4}$/.test(np)) strength++;
    // Check not sequential like 1234
    const notSeq = !(np==='1234'||np==='0000'||np==='1111'||np==='2222'||np==='3333'||np==='4444'||np==='5555'||np==='6666'||np==='7777'||np==='8888'||np==='9999');
    if(notSeq) strength++;
    if(strength===1){color='var(--red)';w='33%';}
    else if(strength===2){color='var(--amber)';w='66%';}
    else if(strength===3){color='var(--green)';w='100%';}
    sb.style.background=color; sb.style.width=w;
  }
  if(mb){
    if(cp.length===0){ mb.textContent=''; mb.style.color='var(--faint)'; }
    else if(np===cp){ mb.textContent='✓ PINs match'; mb.style.color='var(--green)'; }
    else { mb.textContent='✗ PINs do not match'; mb.style.color='var(--red)'; }
  }
}

  const np      = document.getElementById('cp-new')?.value.trim();
  const cp      = document.getElementById('cp-confirm')?.value.trim();
  // Validate current PIN
  const userDefault = USER_DB.find(x=>x.name===curUser&&x.role===curRole);
  const effectivePin = getPINForUser(curUser, userDefault?.pin||'');
  if(current !== effectivePin){
    toast('Current PIN is incorrect','err');
    document.getElementById('cp-current').value='';
    document.getElementById('cp-current').focus();
    return;
  }
  // Validate new PIN
  if(!np||np.length!==4||!/^\d{4}$/.test(np)){
    toast('New PIN must be exactly 4 digits','warn');
    return;
  }
  if(np===current){
    toast('New PIN must be different from current PIN','warn');
    return;
  }
  if(np!==cp){
    toast('New PINs do not match','warn');
    return;
  }
  // Save new PIN with timestamp
  setPINData(curUser, np);
  closeM();
  toast(`PIN updated successfully ✓ Valid for ${PIN_EXPIRY_DAYS} days`,'ok');

// UPLOAD ENGINE
// ══════════════════════════════════════
let uploadedData = { bookings: null, enquiries: null };

function handleDrop(e, type){
  e.preventDefault();
  const zone = document.getElementById(type==='bookings'?'bk-zone':'eq-zone');
  if(zone) zone.classList.remove('upzone-active');
  const file = e.dataTransfer.files[0];
  if(file) processFile(file, type);
}

function handleFile(input, type){
  const file = input.files[0];
  if(file) processFile(file, type);
}

function processFile(file, type){
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){
    showPreviewError(type, 'Invalid file type. Please use .xlsx, .xls or .csv');
    return;
  }
  if(file.size > 10*1024*1024){
    showPreviewError(type, 'File too large. Maximum size is 10MB.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      let rows = [];
      if(ext === 'csv'){
        rows = parseCSV(e.target.result);
      } else {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      }
      if(!rows.length){ showPreviewError(type,'File is empty or could not be read.'); return; }
      uploadedData[type] = { rows, filename: file.name };
      showPreview(type, rows, file.name);
    } catch(err){
      showPreviewError(type, 'Error reading file: ' + err.message);
    }
  };
  if(ext === 'csv') reader.readAsText(file, 'latin1');
  else reader.readAsBinaryString(file);
}

function parseCSV(text){
  // Robust CSV parser — handles quoted fields with commas and newlines
  function parseLine(line){
    const vals = [];
    let cur = '', inQ = false;
    for(let i=0; i<line.length; i++){
      const ch = line[i];
      if(ch==='"'){
        if(inQ && line[i+1]==='"'){ cur+='"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if(ch===',' && !inQ){
        vals.push(cur.trim()); cur='';
      } else { cur+=ch; }
    }
    vals.push(cur.trim());
    return vals;
  }
  // Split into lines respecting quoted newlines
  const rows = []; let cur='', inQ=false;
  for(let i=0; i<text.length; i++){
    const ch=text[i];
    if(ch==='"') inQ=!inQ;
    else if((ch==='\n'||ch==='\r') && !inQ){ if(cur.trim()) rows.push(cur); cur=''; continue; }
    cur+=ch;
  }
  if(cur.trim()) rows.push(cur);
  if(rows.length < 2) return [];
  // Parse headers — preserve original case for field lookup
  const headers = parseLine(rows[0]).map(h=>h.replace(/"/g,'').trim());
  return rows.slice(1).filter(l=>l.trim()).map(line=>{
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h,i)=> obj[h] = (vals[i]||'').replace(/"/g,'').trim());
    return obj;
  });
}

  if(!previewEl) return;
  const errors = validateRows(type, rows);
  const preview = rows.slice(0,5);

  // Show only the key mapped columns — not every raw CSV column
  const BOOKING_COLS = [
    {csv:'Customer Name',   label:'Customer'},
    {csv:'Vehicle Description', label:'Model'},
    {csv:'MY',              label:'Model Year'},
    {csv:'Colour',          label:'Color'},
    {csv:'VSB No',          label:'VSB No'},
    {csv:'VIN',             label:'VIN'},
    {csv:'Sales Exec',      label:'SE'},
    {csv:'Date Reserved',   label:'Reserved'},
    {csv:'Finance Status',  label:'Finance'},
    {csv:'Deposit',         label:'Deposit'},
    {csv:'Bank Name',       label:'Bank'},
    {csv:'Trim',            label:'Trim'},
  ];
  const ENQ_COLS = [
    {csv:'Enq Number',      label:'Enq No'},
    {csv:'Enquiry Number',  label:'Enq No'},
    {csv:'Customer Full Name', label:'Customer'},
    {csv:'Vehicle Desc',    label:'Model'},
    {csv:'User Name',       label:'SE'},
    {csv:'Progress Code',   label:'Status'},
    {csv:'Source of Business', label:'Source'},
    {csv:'Lead Strength',   label:'Lead'},
    {csv:'Next Action Date',label:'Next Action'},
  ];

  // Filter to columns that actually exist in this file
  const allCols = type==='bookings' ? BOOKING_COLS : ENQ_COLS;
  const cols = allCols.filter(c => rows[0].hasOwnProperty(c.csv));

  previewEl.innerHTML = `
    <div class="up-preview">

        <div>
          <div class="up-prev-title">📄 ${filename}</div>
          <div class="up-prev-sub">${rows.length} rows detected · Showing first 5</div>
        </div>
        <span class="badge ${errors.length===0?'bg':'br'}">${errors.length===0?'Valid':'Check errors'}</span>
      </div>
      <div class="up-scroll">
        <table class="up-tbl">
          <thead><tr>${cols.map(c=>'<th>'+c.label+'</th>').join('')}</tr></thead>
          <tbody>${preview.map(r=>'<tr>'+cols.map(c=>'<td>'+(r[c.csv]||'—')+'</td>').join('')+'</tr>').join('')}</tbody>
        </table>
      </div>` + `
      ${errors.length>0?`<div class="up-err">⚠️ ${errors.slice(0,3).join(' · ')}${errors.length>3?' · and '+(errors.length-3)+' more...':''}</div>`:'<div class="up-ok">✅ File looks good — ready to import</div>'}
      <div class="up-actions">
        <span class="up-count">${rows.length} records will be imported</span>
        <div style="display:flex;gap:8px">

}

function clearUpload(type){
  uploadedData[type] = null;
  const previewEl = document.getElementById(type==='bookings'?'bk-preview':'eq-preview');
  if(previewEl) previewEl.innerHTML = '';
  const fileEl = document.getElementById(type==='bookings'?'bk-file':'eq-file');
  if(fileEl) fileEl.value = '';
}

function validateRows(type, rows){
  const errors = [];
  if(type==='bookings'){
    const isAGMC = rows[0].hasOwnProperty('VSB No') || rows[0].hasOwnProperty('VIN') || rows[0].hasOwnProperty('Sales Exec');
    if(isAGMC){
      // AGMC real CSV — check key columns
      if(!rows[0].hasOwnProperty('Customer Name')) errors.push('Missing column: "Customer Name"');
      if(!rows[0].hasOwnProperty('VIN'))           errors.push('Missing column: "VIN"');
      if(!rows[0].hasOwnProperty('Sales Exec'))    errors.push('Missing column: "Sales Exec"');
    } else {
      // Simple template
      const required = ['customer','model'];
      required.forEach(f=>{ if(!rows[0].hasOwnProperty(f)) errors.push(`Missing column: "${f}"`); });
    }
  } else {
    const isAGMC = rows[0].hasOwnProperty('Enquiry Number') || rows[0].hasOwnProperty('User Name');
    if(isAGMC){
      if(!rows[0].hasOwnProperty('Customer Full Name')) errors.push('Missing column: "Customer Full Name"');
      if(!rows[0].hasOwnProperty('User Name'))         errors.push('Missing column: "User Name"');
    } else {
      if(!rows[0].hasOwnProperty('customer')) errors.push('Missing column: "customer"');
      if(!rows[0].hasOwnProperty('model'))    errors.push('Missing column: "model"');
    }
  }
  return [...new Set(errors)].slice(0,10);
}

async function doImport(type){
  const data = uploadedData[type];
  if(!data) return;
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Preparing…';
  try {
    let records;
    if(type === 'bookings'){
      records = data.rows.map((r,idx)=>{
        // Support BOTH AGMC's real CSV columns AND the simple template columns
        const isAGMC = r.hasOwnProperty('VSB No') || r.hasOwnProperty('VIN') || r.hasOwnProperty('Sales Exec');
        // Map Finance Status → Deal Stage
        const financeMap = {
          '0. customer to confirm cash /finance': 'Finance Pending',
          '1. finance documents pending':         'Finance Pending',
          '2. finance under process':             'Finance Pending',
          '3. cash deal under process':           'Finance Approved',
          '4. finance approved':                  'Finance Approved',
          '5. lpo received':                      'LPO Received',
          '6. approved loi':                      'LOI Received',
          '7. insured':                           'Insured',
          '8. registered':                        'Registered',
          '9. ready for delivery':                'Ready for Delivery',
          '10. delivered':                        'Delivered',
        };
        const rawFinance = (r['Finance Status']||r.deal||'').trim().toLowerCase();
        const dealStage = financeMap[rawFinance] || 'Finance Pending';
        // Parse date helper
        const parseDate = (d) => {
          if(!d||d.trim()===''||d.includes('--')||d.trim()==='--/--/----') return null;
          const parts = d.trim().split('/');
          if(parts.length===3){
            const year=parts[2], mon=parts[1].padStart(2,'0'), day=parts[0].padStart(2,'0');
            if(year.length!==4||isNaN(parseInt(year))) return null;
            return `${year}-${mon}-${day}`;
          }
          return d.trim()||null;
        };
        const id = isAGMC
          ? ('BK-'+(r['Enq Number']||r['VSB No']||r['VSB']||idx+1).toString().trim())
          : ((r.id||genId('BK')).toString().trim());
        // Helper: empty string -> null for optional fields
        const tx = v => (v||'').trim()||null;
        return {
          id,
          // Field mapping: MY=Model Year, Colour=Color, Customer Name=Customer,
          // Vehicle Description=Model, VSB No=VSB, Sales Exec=SE, Enq Number=ID
          customer:      isAGMC ? (r['Customer Name']||'').trim()         : (r.customer||''),
          model:         isAGMC ? (r['Vehicle Description']||'').trim() : (r.model||''),
          color:         tx(isAGMC ? (r['Colour']||r['Color'])            : r.color),
          vin:           tx(isAGMC ? r['VIN']                             : r.vin),
          vsb_no:        tx(isAGMC ? (r['VSB No']||r['VSB'])             : r.vsb_no),
          enq_number:    tx(isAGMC ? r['Enq Number']                     : r.enq_number),
          model_year:    tx(isAGMC ? (r['MY']||r['Model Year'])           : r.model_year),
          se:            (()=>{
            const VALID_SES = ['Ahmed Darwish','Chadi Akl','Derrick Ferrao','Harsh Jain','Mohamed Aboelella','Nurgiza Shamshibekova'];
            const raw = isAGMC ? (r['Sales Exec']||r['SE']||'').trim() : (r.se||'');
            if(!raw) return 'Unassigned';
            if(VALID_SES.includes(raw)) return raw;
            if(raw==='Management') return 'Management'; // visible to all SEs
            return 'Unassigned'; // any unknown SE maps to Unassigned
          })(),
          date:          isAGMC ? (parseDate(r['Date Reserved'])||new Date().toISOString().split('T')[0]) : (r.date||new Date().toISOString().split('T')[0]),
          deal:          isAGMC ? dealStage : (r.deal||'Finance Pending'),
          pdi:           parseInt(r.pdi)||0,
          tinting:       r.tinting||'None',
          ceramic:       r.ceramic==='true'||r.ceramic==='Yes'||false,
          delivery:      isAGMC ? parseDate(r['Estimated Arrival DAte']) : parseDate(r.delivery),
          delivery_time: r.delivery_time||'11:00 AM',
          pg_assigned:   tx(r.pg_assigned),
          flowers:       r.flowers==='true'||r.flowers==='Yes'||false,
          notes:         tx(isAGMC ? (r['Vehicle Notes']||r['Cust ref']||'') : (r.notes||''))?.substring(0,500)||null,
          view_req:      false,
          deposit:       isAGMC ? (parseInt(((r['Deposit']||r['deposit']||'0')).replace(/[^0-9]/g,''))||0) : (parseInt(r.deposit)||0),

          trim:          tx(isAGMC ? (r['Trim']||r['trim'])           : r.trim),

          bank_name:     tx(isAGMC ? (r['Bank Name']||r['Bank'])      : r.bank_name),
        };
      });
    } else {
      // Support BOTH AGMC real enquiry CSV AND simple template
      records = data.rows.map((r,idx)=>{
        const isAGMC = r.hasOwnProperty('Enquiry Number') || r.hasOwnProperty('Enq Number') || r.hasOwnProperty('User Name') || r.hasOwnProperty('Progress Code');
        const parseDate = (d) => {
          if(!d||d.trim()===''||d.includes('--')||d.trim()==='--/--/----') return null;
          const parts = d.trim().split('/');
          if(parts.length===3){
            const year=parts[2], mon=parts[1].padStart(2,'0'), day=parts[0].padStart(2,'0');
            if(year.length!==4||isNaN(parseInt(year))) return null;
            return `${year}-${mon}-${day}`;
          }
          return d.trim()||null;
        };
        // Map Progress Code → Status
        const progressMap = { 'Enq':'Open', 'Quo':'Follow-Up', 'Ord':'Converted to Booking' };
        // Map Source of Business → readable source
        const sourceMap = {
          'IG':'Instagram','CALLCENT':'Call Centre','WINDSHOP':'Walk-In',
          'MINIPORT':'Website (MINI)','BMWiPORT':'Website (BMW)','REFF':'Referral',
          'WHTAPP':'WhatsApp','SB':'Showroom','EMAIL':'Email',
          'EVNT':'Event','FB':'Facebook','GOOG':'Google',
        };
        // Map Lead Strength → Interest
        const interestMap = { 'HOT':'Purchase', 'WARM':'Test Drive', 'COLD':'Enquiry' };
        if(isAGMC){
          const rawProgress = (r['Progress Code']||'Enq').trim();
          const rawSource   = (r['Source of Business']||'').trim().toUpperCase();
          const rawLead     = (r['Lead Strength from Enquiry']||'COLD').trim().toUpperCase();
          return {
            id:       'ENQ-'+(r['Enquiry Number']||idx+1).toString().trim(),
            customer: (r['Customer Full Name']||'').trim(),
            model:    (r['Vehicle Desc']||'').trim(),
            interest: interestMap[rawLead]||'Enquiry',
            source:   sourceMap[rawSource]||r['Source of Business']||'Other',
            date:     parseDate(r['Next Action Date'])||new Date().toISOString().split('T')[0],
            status:   progressMap[rawProgress]||'Open',
            se:       (r['User Name']||'').trim()||'Unassigned',
            notes:    [
              r['Lead Strength from Enquiry']?`Lead: ${r['Lead Strength from Enquiry']}`:'',
              r['Mobile']?`📱 ${r['Mobile']}` :'',
              r['E-mail Address']?`✉️ ${r['E-mail Address']}`:'',
              r['Nationality']?`🌍 ${r['Nationality']}`:'',
            ].filter(Boolean).join(' · ').substring(0,500)||null,
          };
        } else {
          return {
            id:       (r.id||genId('ENQ')).toString().trim(),
            customer: r.customer||'',
            model:    r.model||'',
            interest: r.interest||'Purchase',
            source:   r.source||'Walk-In',
            date:     r.date||new Date().toISOString().split('T')[0],
            status:   r.status||'Open',
            se:       r.se||'Unassigned',
            notes:    r.notes||'',
          };
        }
      });
    }
    // Deduplicate by id — keep last occurrence (most recent data wins)
    const seen = new Map();
    records.forEach(r => seen.set(r.id, r));
    records = Array.from(seen.values());

    const table = type==='bookings'?'bookings':'enquiries';

    // ── SMART MERGE: fetch existing records first ──────────
    // For bookings: preserve manually-set fields (pdi, tinting, ceramic,
    // pg_assigned, flowers) — only update CSV-sourced fields
    btn.textContent = 'Fetching existing data…';
    const ids = records.map(r=>r.id);
    // Fetch in batches of 200 to avoid URL length limits
    let existing = [];
    for(let i=0; i<ids.length; i+=200){
      const chunk = ids.slice(i,i+200);
      const {data} = await supa.from(table).select('*').in('id', chunk);
      if(data) existing = existing.concat(data);
    }
    // IMPORTANT: Records NOT in the CSV are kept as-is (never deleted on upload)
    // Only records IN the CSV are upserted/merged
    const existingMap = new Map(existing.map(r=>[r.id, r]));

    let newCount = 0, updatedCount = 0;
    const mergedRecords = records.map(r => {
      const prev = existingMap.get(r.id);
      if(!prev){
        newCount++;
        return r; // New record — insert as-is
      }
      updatedCount++;
      if(type==='bookings'){
        // Merge: CSV wins for core info, preserve manual operational fields
        return {
          ...r,
          // CSV fields always win (overwrite old values)
          customer:    r.customer    || prev.customer,
          model:       r.model       || prev.model,
          color:       r.color       || prev.color,
          vin:         r.vin         || prev.vin,
          vsb_no:      r.vsb_no      || prev.vsb_no,
          enq_number:  r.enq_number  || prev.enq_number,
          model_year:  r.model_year  || prev.model_year,
          trim:        r.trim        || prev.trim,
          deposit:     r.deposit     || prev.deposit,
          bank_name:   r.bank_name   || prev.bank_name,
          se:          r.se          || prev.se,
          date:        r.date        || prev.date,
          // Preserve manually-set operational fields if already set
          pdi:           prev.pdi > 0 ? prev.pdi : r.pdi,
          tinting:       prev.tinting && prev.tinting!=='None' ? prev.tinting : r.tinting,
          ceramic:       prev.ceramic || r.ceramic,
          pg_assigned:   prev.pg_assigned || r.pg_assigned,
          flowers:       prev.flowers || r.flowers,
          delivery_time: prev.delivery_time || r.delivery_time,
          // CSV always wins for deal stage UNLESS manually advanced beyond CSV value
          deal: advancedDeal(prev.deal, r.deal) ? prev.deal : r.deal,
          // Notes: merge both if different
          notes: mergeNotes(prev.notes, r.notes),
        };
      } else {
        // Enquiries: merge notes, preserve assigned SE if already set
        return {
          ...r,
          se: (prev.se && prev.se!=='Unassigned') ? prev.se : r.se,
          notes: mergeNotes(prev.notes, r.notes),
        };
      }
    });

    // Helper: is prevDeal manually advanced beyond csvDeal?
    function advancedDeal(prevDeal, csvDeal){
      const stages=['Finance Pending','Finance Approved','LPO Received','LOI Received','Insured','Registered','Ready for Delivery','Delivered'];
      return stages.indexOf(prevDeal) > stages.indexOf(csvDeal);
    }
    // Helper: merge notes without duplication
    function mergeNotes(prev, csv){
      if(!prev || prev===csv) return csv||null;
      if(!csv) return prev;
      if(prev.includes(csv)) return prev;
      return csv; // CSV note wins but keep if different
    }

    // ── BATCH UPSERT merged records ────────────────────────
    const BATCH = 50;
    const total = mergedRecords.length;
    let imported = 0;

    // Auto-detect which columns exist in Supabase by checking a sample row
    // Strip any columns the DB doesn't know about to avoid silent data loss
    btn.textContent = 'Checking DB columns…';
    let allowedCols = null;
    try {
      const {data: probe} = await supa.from(table).select('*').limit(1);
      if(probe && probe.length > 0) allowedCols = new Set(Object.keys(probe[0]));
    } catch(e){ /* ignore — will try full upsert */ }

    // Filter records to only include columns that exist in DB
    const safeRecords = allowedCols
      ? mergedRecords.map(r => {
          const safe = {};
          for(const k of Object.keys(r)){
            if(allowedCols.has(k)) safe[k] = r[k];
          }
          return safe;
        })
      : mergedRecords;

    // Show which columns are being skipped (missing from DB)
    if(allowedCols){
      const allCols = new Set(mergedRecords.flatMap(r => Object.keys(r)));
      const skipped = [...allCols].filter(c => !allowedCols.has(c));
      if(skipped.length > 0){
        toast(`⚠️ Missing DB columns skipped: ${skipped.join(', ')} — run SQL migration to enable them`, 'warn');
      }
    }

    for(let i=0; i<total; i+=BATCH){
      const chunk = safeRecords.slice(i, i+BATCH);
      const batchNum = Math.floor(i/BATCH)+1;
      const totalBatches = Math.ceil(total/BATCH);
      btn.textContent = `Importing… batch ${batchNum}/${totalBatches}`;
      const {error} = await supa.from(table).upsert(chunk, {onConflict:'id', ignoreDuplicates:false});
      if(error) throw new Error(`Batch ${batchNum} failed: ${error.message}`);
      imported += chunk.length;
    }
    // ── CLEANUP: Remove stale VSB-based records replaced by ENQ-based ones ──
    if(type === 'bookings'){
      // New records use BK-{EnqNumber}. Old records used BK-{VSBNo}.
      // Find old stale IDs: records whose vsb_no matches a newly imported vsb_no
      // but whose id is NOT in the new import list
      const newIds = new Set(safeRecords.map(r => r.id));
      const newVsbs = new Set(safeRecords.map(r => r.vsb_no).filter(Boolean));
      try {
        const {data: allExisting} = await supa.from('bookings').select('id,vsb_no');
        const staleIds = (allExisting||[])
          .filter(r => !newIds.has(r.id) && r.vsb_no && newVsbs.has(r.vsb_no))
          .map(r => r.id);
        if(staleIds.length > 0){
          await supa.from('bookings').delete().in('id', staleIds);
          console.log('Cleaned stale VSB-based records:', staleIds);
        }
      } catch(e){ console.warn('Cleanup skipped:', e.message); }
    }

    // Summary
    const summaryMsg = newCount > 0 && updatedCount > 0
      ? `${newCount} new · ${updatedCount} updated`
      : newCount > 0 ? `${newCount} new records added`
      : `${updatedCount} records updated`;
    // imported = mergedRecords.length (set in batch loop below)
    // Log to upload history
    addUploadHistory(type, data.filename, imported, summaryMsg);
    toast(`${summaryMsg} — ${type} import complete ✓`, 'ok');
    clearUpload(type);
    await loadAll();
    // Navigate to the relevant page so user sees the imported data
    if(type==='bookings') goTo('bookings');
    else if(type==='enquiries') goTo('enquiries');
  } catch(err){
    const errMsg = err.message||'Unknown error';
    toast('Import failed: ' + errMsg, 'err');
    // Show error in preview panel too
    const previewEl = document.getElementById(type==='bookings'?'bk-preview':'eq-preview');
    if(previewEl){
      const errDiv = previewEl.querySelector('.up-err')||document.createElement('div');
      errDiv.className = 'up-err';
      errDiv.textContent = '❌ Import failed: ' + errMsg + ' — Check your internet connection and try again.';
      if(!previewEl.querySelector('.up-err')) previewEl.appendChild(errDiv);
    }
    btn.disabled = false;
    btn.textContent = `⬆ Retry Import (${data.rows.length} Records)`;
  }
}

function addUploadHistory(type, filename, count, summary=''){
  const tbody = document.getElementById('upload-history');
  if(!tbody) return;
  const now = new Date();
  const timeStr = now.toLocaleDateString('en-AE',{month:'short',day:'numeric'})+', '+now.toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit'});
  const existing = tbody.querySelector('td[colspan]');
  if(existing) tbody.innerHTML = '';
  const row = document.createElement('tr');
  row.innerHTML = `<td class="tm tb">${timeStr}</td><td style="text-transform:capitalize">${type}</td><td class="tm" style="font-size:10px">${filename}</td><td>${count}<br/><span style="font-size:9px;color:var(--dim)">${summary}</span></td><td>${curUser}</td><td><span class="badge bg">Success</span></td>`;
  tbody.insertBefore(row, tbody.firstChild);
}

function downloadTemplate(type){
  let headers, sample;
  if(type==='bookings'){
    headers = ['id','customer','model','color','vin','se','date','deal','tinting','ceramic','delivery','delivery_time','pg_assigned','flowers','notes'];
    sample  = ['BK-001','Customer Full Name','F66 3D Hatch Cooper JCW','Midnight Black','WMW33DH0X01A12345','Ahmed Darwish','2024-03-18','Finance Pending','30%','No','2024-03-25','11:00 AM','Faizan Asim','No','Special notes here'];
  } else {
    headers = ['id','customer','model','interest','source','date','status','se','notes'];
    sample  = ['ENQ-001','Customer Full Name','U25 Countryman JCW ALL4','Purchase','Walk-In','2024-03-18','Open','Ahmed Darwish','Notes here'];
  }
  const ws = XLSX.utils.aoa_to_sheet([headers, sample]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, type);
  XLSX.writeFile(wb, `agmc_${type}_template.xlsx`);
  toast(`${type} template downloaded ✓`, 'ok');
}

function previewBookingForDelivery(bookingId){

async function doSaveDeliveryFromPage(){
  const bookingId = document.getElementById('sdp-booking')?.value;
  const date  = document.getElementById('sdp-date')?.value;
  const time  = document.getElementById('sdp-time')?.value;
  const pg    = document.getElementById('sdp-pg')?.value;
  const notes = document.getElementById('sdp-notes')?.value||null;
  if(!bookingId){toast('Please select a booking','warn');return;}
  if(!date){toast('Please select a delivery date','warn');return;}
  if(!pg){toast('Please assign a Product Genius','warn');return;}
  const b = DB.bookings.find(x=>x.id===bookingId);
  const existing = DB.deliveries.find(d=>d.booking_id===bookingId);
  const record = {
    booking_id: bookingId,
    customer: b?.customer||'',
    model: b?.model||'',
    se: b?.se||'',
    delivery_date: date,
    delivery_time: time,
    pg_assigned: pg,
    special_instructions: notes,
    status: 'Scheduled',
    created_by: curUser,
  };
  let error;
  if(existing){
    ({error} = await supa.from('deliveries').update(record).eq('id',existing.id));
  } else {
    ({error} = await supa.from('deliveries').insert([record]));
  }
  if(error){toast('Error: '+error.message,'err');return;}
  await supa.from('bookings').update({delivery:date,delivery_time:time,pg_assigned:pg}).eq('id',bookingId);
  await supa.from('notifications').insert([
    {title:`🚗 Delivery Scheduled — ${bookingId}`,body:`${b?.customer} — ${b?.model} on ${date} at ${time}. PG: ${pg}`,type:'delivery',target_role:'pg',read:false,booking_id:bookingId},
    {title:`🚗 Delivery Scheduled — ${bookingId}`,body:`${curUser} scheduled delivery for ${b?.customer} on ${date}`,type:'delivery',target_role:'sa',read:false,booking_id:bookingId},
  ]);
  closeM();
  toast(`Delivery scheduled ✓ — ${pg} notified`,'ok');
  await loadAll(); goTo('delivery');
}

async function doSaveScheduleDelivery(bookingId, existingId){
  const date  = document.getElementById('sd-date')?.value;
  const time  = document.getElementById('sd-time')?.value;
  const pg    = document.getElementById('sd-pg')?.value;
  const notes = document.getElementById('sd-notes')?.value||null;
  if(!date){toast('Please select a delivery date','warn');return;}
  if(!pg){toast('Please assign a Product Genius','warn');return;}
  const b = DB.bookings.find(x=>x.id===bookingId);
  const record = {
    booking_id: bookingId,
    customer: b?.customer||'',
    model: b?.model||'',
    se: b?.se||'',
    delivery_date: date,
    delivery_time: time,
    pg_assigned: pg,
    special_instructions: notes,
    status: 'Scheduled',
    created_by: curUser,
  };
  let error;
  if(existingId){
    ({error} = await supa.from('deliveries').update(record).eq('id',existingId));
  } else {
    ({error} = await supa.from('deliveries').insert([record]));
  }
  if(error){toast('Error saving delivery: '+error.message,'err');return;}
  // Update booking delivery fields too
  await supa.from('bookings').update({delivery:date, delivery_time:time, pg_assigned:pg}).eq('id',bookingId);
  // Notify PG and SA
  await supa.from('notifications').insert([
    {title:`🚗 New Delivery Scheduled — ${bookingId}`,body:`${b?.customer} — ${b?.model} scheduled for ${date} at ${time}. PG: ${pg}`,type:'delivery',target_role:'pg',read:false,booking_id:bookingId},

  toast(`Delivery scheduled ✓ — ${pg} notified`,'ok');
  await loadAll();
  goTo(curPage);
}
