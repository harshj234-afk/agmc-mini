// ══════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════
function renderNotif(){
  const unread=DB.notifications.filter(n=>!n.read).length;
  const dot=document.getElementById('nb-dot');
  if(dot) dot.classList.toggle('on',unread>0);
  const list=document.getElementById('np-list');
  if(list) list.innerHTML=DB.notifications.slice(0,20).map(n=>{
    const pageMap={
      'pdi':'pdi', 'flag':'flags', 'deal':'deals',
      'delivery':'delivery', 'viewing':'viewing'
    };
    const targetPage = pageMap[n.type]||null;
    const bookingId = n.booking_id||null;
    const timeStr = n.created_at ? new Date(n.created_at).toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="ni ${n.read?'':'unread'}" onclick="handleNotifClick('${n.id}','${targetPage||''}','${bookingId||''}')">
      <div class="ni-t">${n.title}</div>
      <div class="ni-b">${n.body}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
        <div class="ni-ts">${timeStr}</div>
        ${targetPage?`<span style="font-size:9px;color:var(--red);font-weight:700;letter-spacing:.5px">TAP TO VIEW →</span>`:''}
      </div>
    </div>`;
  }).join('');
}
function toggleNotif(){ notifOpen=!notifOpen; document.getElementById('np').classList.toggle('on',notifOpen); }
async function handleNotifClick(id, targetPage, bookingId){
  // Mark as read
  await supa.from('notifications').update({read:true}).eq('id',id);
  const n=DB.notifications.find(x=>x.id===id); if(n) n.read=true; renderNotif();
  // Close notif panel
  notifOpen=false; document.getElementById('np').classList.remove('on');
  // Navigate to correct page
  if(targetPage){
    await goTo(targetPage);
    // If booking-specific, open booking modal after navigation
    if(bookingId && (targetPage==='delivery'||targetPage==='pdi')){
      setTimeout(()=>openBkModal(bookingId),400);
    }
  }
}

async function markNRead(id){
  await supa.from('notifications').update({read:true}).eq('id',id);
  const n=DB.notifications.find(x=>x.id===id); if(n) n.read=true; renderNotif();
}
async function markAllRead(){
  await supa.from('notifications').update({read:true}).eq('read',false);
  DB.notifications.forEach(n=>n.read=true); renderNotif(); toast('All read','ok');
}

// ══════════════════════════════════════
// FILTER BOOKINGS
// ══════════════════════════════════════
function filterBks(){
  const s=(document.getElementById('bsrch')?.value||'').toLowerCase();
  const d=document.getElementById('bdeal')?.value||'';
  const se=document.getElementById('bse')?.value||'';
  const p=document.getElementById('bpdi')?.value;
  // Base: use all bookings for current role, handle Lost filter
  let base = curRole==='se'
    ? DB.bookings.filter(b=>b.se===curUser)
    : DB.bookings;
  const bks = base.filter(b=>{
    const ms=!s||(b.customer||'').toLowerCase().includes(s)||(b.model||'').toLowerCase().includes(s)||(b.id||'').toLowerCase().includes(s);
    const md = d===''   ? b.deal!=='Lost'      // default: hide Lost
             : d==='ALL'? true                  // show everything
             : b.deal===d;                       // specific stage
    const mse=!se||b.se===se;
    const mp=p===''||p===undefined||b.pdi===parseInt(p);
    return ms&&md&&mse&&mp;
  });
  const tbody=document.getElementById('bks-body');
  const thead=document.getElementById('bks-thead');
  if(tbody){
    tbody.innerHTML=bks.length?bks.map(b=>bRow(b)).join(''):`<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--faint)">No bookings found</td></tr>`;
    if(thead && window.innerWidth<=600) thead.style.display='none';
  }
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function toast(msg,type='ok'){
  const ico={ok:'✅',warn:'⚠️',err:'❌'};
  const el=document.createElement('div');
  el.className=`toast t${type}`;
  el.innerHTML=`<span>${ico[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('tw').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ══════════════════════════════════════
// AUTO-RESTORE SESSION ON REFRESH
// ══════════════════════════════════════
(async function restoreSession(){
  const savedRole = sessionStorage.getItem('agmc_role');
  const savedUser = sessionStorage.getItem('agmc_user');
  if(savedRole && savedUser){
    curRole = savedRole;
    curUser = savedUser;
    const btn = document.getElementById('login-btn');
    if(btn){ btn.disabled=true; btn.textContent='Restoring…'; }
    try {
      await loadAll();
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').classList.add('on');
      initApp();
    } catch(e){
      sessionStorage.removeItem('agmc_role');
      sessionStorage.removeItem('agmc_user');
      if(btn){ btn.disabled=false; btn.textContent='Enter →'; }
    }
  }
})();

// ══════════════════════════════════════
// SIDEBAR TOGGLE (mobile/tablet)
// ══════════════════════════════════════
function toggleSidebar(){
  const sb = document.querySelector('.sb');
  if(!sb) return;
  sb.classList.contains('open') ? closeSidebar() : openSidebar();
}
function openSidebar(){
  const sb = document.querySelector('.sb');
  const ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.add('open');
  if(ov) ov.classList.add('on');
  // Don't touch body overflow — body is already position:fixed
  // Prevent content scroll while sidebar open
  const c = document.getElementById('content');
  if(c) c.style.overflow = 'hidden';
}
function closeSidebar(){
  const sb = document.querySelector('.sb');
  const ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('on');
  const c = document.getElementById('content');
  if(c) c.style.overflow = '';
}
// Auto-close sidebar on nav click (mobile)
function setupMobileNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>{
      if(window.innerWidth <= 900) setTimeout(closeSidebar, 120);
    });
  });
}

// Close notif on outside click
document.addEventListener('click',e=>{
  if(notifOpen&&!e.target.closest('#np')&&!e.target.closest('.tb-btn')){notifOpen=false;document.getElementById('np').classList.remove('on');}
});
</script>
